services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ${DB_DATA_DIR:-./pgdata}:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -h 127.0.0.1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "${DB_BIND_HOST:-127.0.0.1}:${DB_BIND_PORT:-5432}:5432"
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${APP_IMAGE_REPOSITORY:-ghcr.io/14zy/worldkycproject}:${APP_IMAGE_TAG:-latest}
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ${COMPOSE_ENV_FILE:-.env.compose}
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    networks:
      - default
      - mailcow_net
    ports:
      - "${APP_BIND_HOST:-127.0.0.1}:${APP_BIND_PORT:-8080}:8080"
    restart: unless-stopped

networks:
  mailcow_net:
    external: true
    name: ${MAILCOW_NETWORK_NAME:-mailcowdockerized_mailcow-network}
